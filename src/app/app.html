<div class="min-h-screen bg-slate-950 flex flex-col font-sans select-none antialiased">
  <!-- Navigation Header -->
  <header class="sticky top-0 z-40 bg-slate-950/70 border-b border-slate-900 backdrop-blur-md px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <!-- MediaDeck Logo (Sleek minimalist logo) -->
      <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-red-600 via-indigo-600 to-emerald-500 p-[2px] shadow-lg shadow-indigo-950/40">
        <div class="w-full h-full bg-slate-950 rounded-[10px] flex items-center justify-center text-slate-100 font-extrabold text-lg">
          Ω
        </div>
      </div>
      <div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-slate-100 to-slate-300 bg-clip-text text-transparent">
          MediaDeck
        </h1>
        <p class="text-[10px] text-slate-500 font-mono tracking-widest uppercase">Streaming Console</p>
      </div>
    </div>

    <!-- Mode Selector Tabs -->
    <nav class="flex gap-2 bg-slate-900/60 p-1 border border-slate-900 rounded-xl">
      <a
        routerLink="youtube"
        routerLinkActive="bg-slate-800 text-slate-100 border-slate-700/50 shadow-lg"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-2 px-5 py-2 text-sm font-medium text-slate-400 border border-transparent rounded-lg hover:text-slate-200 transition"
      >
        <span class="w-2 h-2 rounded-full bg-red-500"></span>
        YouTube
      </a>
      <a
        routerLink="spotify"
        routerLinkActive="bg-slate-800 text-slate-100 border-slate-700/50 shadow-lg"
        class="flex items-center gap-2 px-5 py-2 text-sm font-medium text-slate-400 border border-transparent rounded-lg hover:text-slate-200 transition"
      >
        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
        Spotify
      </a>
    </nav>

    <!-- Version tag -->
    <div class="hidden sm:block">
      <span class="px-2.5 py-1 text-[10px] font-mono font-semibold bg-slate-900/80 border border-slate-800 rounded-full text-slate-400 uppercase tracking-widest">
        v2.0-signal-free
      </span>
    </div>
  </header>

  <!-- Router Content Outlet -->
  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>
</div>
